<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Cards Creating Machine</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <div class="container">
      <div class="info-section">
        <h2 class="info-title">Let's Build you Service Card for you project</h2>
        <p class="description">
          Ready to launch you next projct? Fill our the form below or reach
          out directly to start a converstion about you business needs and how we can help you grow.
        </p>

        <i class="fa-solid fa-envelope" id="mail-icon"></i>
      
      </div>

      <div class="form-section">
        <form action="#" method="post">
          <div class="form-row">
            <label for="card-title">Card Title</label>
            <input type="text" id="card-title" placeholder="title">
          </div>

          <div class="form-row">
            <label for="card-description">Description</label>
            <textarea name="card-description" id="card-description"></textarea>
          </div>

          <div class="form-row">
            <label for="contact-info">Contact</label>
            <input type="text" id="contact-info">
          </div>

          <div class="form-row">
            <button type="submit" class="submit-btn">
              <i class="fa-solid fa-paper-plane"></i>
              Submit
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
